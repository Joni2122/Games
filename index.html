<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Runner Pro</title>

<style>
  body {
    margin: 0;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: system-ui, sans-serif;
    color: white;
  }

  #gameCanvas {
    background: #020617;
    border: 2px solid #334155;
    border-radius: 12px;
  }

  #restartBtn {
    position: absolute;
    top: 20px;
    right: 20px;
    padding: 10px 18px;
    background: #38bdf8;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    display: none;
  }
</style>
</head>

<body>

<canvas id="gameCanvas" width="900" height="500"></canvas>
<button id="restartBtn">Neu starten</button>

<script>
/* ---------------------------------------------------------
   NEON RUNNER PRO – Komplettes Spiel
--------------------------------------------------------- */

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const restartBtn = document.getElementById("restartBtn");

let player, obstacles, particles, bgLayers, score, gameOver, frame;

/* ---------------------------------------------------------
   SPIEL INITIALISIEREN
--------------------------------------------------------- */
function initGame() {
  player = {
    x: 120,
    y: 380,
    w: 40,
    h: 60,
    vy: 0,
    gravity: 0.7,
    jump: -15,
    onGround: true
  };

  obstacles = [];
  particles = [];
  score = 0;
  frame = 0;
  gameOver = false;

  bgLayers = [
    { x: 0, speed: 0.5, color: "#1e293b" },
    { x: 0, speed: 1.0, color: "#334155" },
    { x: 0, speed: 2.0, color: "#475569" }
  ];

  restartBtn.style.display = "none";
}

/* ---------------------------------------------------------
   EINGABE
--------------------------------------------------------- */
window.onkeydown = e => {
  if (e.key === " " && player.onGround && !gameOver) {
    player.vy = player.jump;
    player.onGround = false;
  }
};

canvas.onclick = () => {
  if (player.onGround && !gameOver) {
    player.vy = player.jump;
    player.onGround = false;
  }
};

/* ---------------------------------------------------------
   HINTERGRUND PARALLAX
--------------------------------------------------------- */
function drawBackground() {
  bgLayers.forEach(layer => {
    layer.x -= layer.speed;
    if (layer.x <= -canvas.width) layer.x = 0;

    ctx.fillStyle = layer.color;
    ctx.fillRect(layer.x, 0, canvas.width, canvas.height);
    ctx.fillRect(layer.x + canvas.width, 0, canvas.width, canvas.height);
  });
}

/* ---------------------------------------------------------
   SPIELER UPDATE
--------------------------------------------------------- */
function updatePlayer() {
  player.vy += player.gravity;
  player.y += player.vy;

  if (player.y >= 380) {
    player.y = 380;
    player.vy = 0;
    player.onGround = true;
  }
}

/* ---------------------------------------------------------
   HINDERNISSE
--------------------------------------------------------- */
function spawnObstacle() {
  if (Math.random() < 0.02) {
    obstacles.push({
      x: canvas.width + 20,
      y: 420,
      w: 40,
      h: 60,
      speed: 7
    });
  }
}

function updateObstacles() {
  obstacles.forEach(o => o.x -= o.speed);
  obstacles = obstacles.filter(o => o.x > -60);
}

/* ---------------------------------------------------------
   PARTIKEL
--------------------------------------------------------- */
function spawnParticles() {
  for (let i = 0; i < 2; i++) {
    particles.push({
      x: player.x + 10,
      y: player.y + player.h,
      vx: (Math.random() - 0.5) * 2,
      vy: Math.random() * -2,
      alpha: 1
    });
  }
}

function updateParticles() {
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.alpha -= 0.02;
  });
  particles = particles.filter(p => p.alpha > 0);
}

/* ---------------------------------------------------------
   KOLLISION
--------------------------------------------------------- */
function checkCollision() {
  for (let o of obstacles) {
    if (
      player.x < o.x + o.w &&
      player.x + player.w > o.x &&
      player.y < o.y + o.h &&
      player.y + player.h > o.y
    ) {
      return true;
    }
  }
  return false;
}

/* ---------------------------------------------------------
   ZEICHNEN
--------------------------------------------------------- */
function drawPlayer() {
  ctx.fillStyle = "#38bdf8";
  ctx.fillRect(player.x, player.y, player.w, player.h);
}

function drawObstacles() {
  ctx.fillStyle = "#f97316";
  obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));
}

function drawParticles() {
  particles.forEach(p => {
    ctx.fillStyle = `rgba(56,189,248,${p.alpha})`;
    ctx.fillRect(p.x, p.y, 4, 4);
  });
}

function drawScore() {
  ctx.fillStyle = "white";
  ctx.font = "24px system-ui";
  ctx.fillText("Score: " + score, 20, 40);
}

/* ---------------------------------------------------------
   GAME LOOP
--------------------------------------------------------- */
function loop() {
  if (gameOver) return;

  frame++;
  score++;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawBackground();
  updatePlayer();
  spawnObstacle();
  updateObstacles();
  spawnParticles();
  updateParticles();

  drawPlayer();
  drawObstacles();
  drawParticles();
  drawScore();

  if (checkCollision()) {
    gameOver = true;
    restartBtn.style.display = "block";
    ctx.fillStyle = "white";
    ctx.font = "40px system-ui";
    ctx.fillText("GAME OVER", canvas.width / 2 - 120, 200);
    return;
  }

  animationId = requestAnimationFrame(loop);
}

/* ---------------------------------------------------------
   START
--------------------------------------------------------- */
initGame();
loop();

/* ---------------------------------------------------------
   RESTART
--------------------------------------------------------- */
restartBtn.onclick = () => {
  initGame();
  loop();
};
</script>

</body>
</html>
